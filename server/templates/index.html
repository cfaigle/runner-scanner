<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Race Timer</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="login-container">
                <h1>🏃 Runner Race Timer</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p class="register-link">
                    Don't have an account? <a href="#" id="show-register">Register</a>
                </p>
                
                <form id="register-form" style="display: none;">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-fullname">Full Name</label>
                        <input type="text" id="reg-fullname" name="fullname">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                    <button type="button" class="btn btn-secondary" id="hide-register">Cancel</button>
                </form>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-screen" class="screen" style="display: none;">
            <nav class="navbar">
                <div class="nav-brand">🏃 Runner Race Timer</div>
                <div class="nav-user">
                    <span id="user-display"></span>
                    <button class="btn btn-small" id="logout-btn">Logout</button>
                </div>
            </nav>

            <div class="container">
                <!-- Dashboard -->
                <div class="dashboard">
                    <div class="tabs">
                        <button class="tab active" data-tab="races">Races</button>
                        <button class="tab" data-tab="results">Results</button>
                        <button class="tab" data-tab="entries">Entries</button>
                        <button class="tab" data-tab="settings">Settings</button>
                    </div>

                    <!-- Races Tab -->
                    <div id="races-tab" class="tab-content active">
                        <div class="tab-header">
                            <h2>Races</h2>
                            <button class="btn btn-primary" id="new-race-btn">+ New Race</button>
                        </div>
                        <div id="races-list" class="cards-grid"></div>
                    </div>

                    <!-- Results Tab -->
                    <div id="results-tab" class="tab-content">
                        <div class="tab-header">
                            <h2>Live Results</h2>
                            <select id="results-race-select" class="form-select">
                                <option value="">Select a Race</option>
                            </select>
                        </div>
                        <div id="results-display">
                            <div id="live-announcements" class="announcements"></div>
                            <table id="results-table" class="results-table">
                                <thead>
                                    <tr>
                                        <th>Pos</th>
                                        <th>Runner</th>
                                        <th>ID</th>
                                        <th>Laps</th>
                                        <th>Total Time</th>
                                        <th>Best Lap</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Entries Tab -->
                    <div id="entries-tab" class="tab-content">
                        <div class="tab-header">
                            <h2>Race Entries</h2>
                            <select id="entries-race-select" class="form-select">
                                <option value="">Select a Race</option>
                            </select>
                            <button class="btn btn-primary" id="new-entry-btn">+ Add Entry</button>
                        </div>
                        <div id="entries-list" class="cards-grid"></div>
                    </div>

                    <!-- Settings Tab -->
                    <div id="settings-tab" class="tab-content">
                        <h2>Settings</h2>
                        <div class="settings-section">
                            <h3>Server QR Code</h3>
                            <p>Scan this QR code to connect mobile devices to this server</p>
                            <div id="server-qr-container"></div>
                            <button class="btn btn-secondary" id="generate-server-qr">Generate QR</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="modal-overlay" style="display: none;">
            <div id="modal-content" class="modal"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
